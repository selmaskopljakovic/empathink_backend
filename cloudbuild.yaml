# Google Cloud Build configuration
# Deploy to Cloud Run

steps:
  # Step 0: Run tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r requirements.txt
        pip install pytest httpx
        python -m pytest tests/ -v --tb=short
    id: 'run-tests'

  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/empathink-backend', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/empathink-backend']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'empathink-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/empathink-backend'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '120'
      - '--concurrency'
      - '20'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,LOG_LEVEL=INFO,FIREBASE_PROJECT_ID=empathink-66fb2'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/empathink-backend'

options:
  logging: CLOUD_LOGGING_ONLY
